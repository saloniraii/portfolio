name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir _site
          cp index.html _site/
          cp resume.pdf _site/
          cp -r shared _site/
          cp -r work _site/
          cp -r collage _site/
          cp -r gallery _site/
          cp -r logos _site/
          cp -r cursor _site/
          cp -r fonts _site/
          touch _site/.nojekyll
          # Remove dev-only Figma capture script
          sed -i '/<script src="https:\/\/mcp.figma.com\/mcp\/html-to-design\/capture.js"/d' _site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
