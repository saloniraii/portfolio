<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversational Edge Cases — Design Patterns</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800;9..144,900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #B22222;
            --bg: #fafafa;
            --dark: #0f0f0f;
            --foreground: #1a1a1a;
            --muted: #737373;
            --body-font: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: rgba(178, 34, 34, 0.2); color: inherit; }

        body {
            background: var(--bg);
            color: var(--foreground);
            font-family: var(--body-font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .demo-container {
            width: 100%;
            max-width: 560px;
        }

        /* ─── SCENARIO TABS ─── */
        .scenario-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .scenario-tab {
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            border: 1.5px solid #e5e5e5;
            background: #fff;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--body-font);
            line-height: 1.3;
        }

        .scenario-tab:hover {
            border-color: var(--foreground);
            color: var(--foreground);
        }

        .scenario-tab.active {
            background: var(--dark);
            color: #fff;
            border-color: var(--dark);
        }

        /* ─── CONTEXT STRIP ─── */
        .context-strip {
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
        }

        .context-strip .label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .context-strip .desc {
            font-size: 0.8rem;
            color: var(--foreground);
            line-height: 1.4;
        }

        /* ─── CHAT BOX — simple rectangle ─── */
        .chat-box {
            width: 100%;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
        }

        .chat-messages {
            height: 520px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ─── MESSAGES — plain text style ─── */
        .msg {
            opacity: 0;
            transform: translateY(6px);
            animation: msgIn 0.35s ease-out forwards;
        }

        @keyframes msgIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin-bottom: 3px;
        }

        .msg-label.user-label {
            color: var(--accent);
        }

        .msg-label.bot-label {
            color: var(--muted);
        }

        .msg-body {
            font-size: 0.84rem;
            line-height: 1.6;
            color: var(--foreground);
        }

        .msg-body strong {
            font-weight: 700;
        }

        .msg-body em {
            opacity: 0.65;
            font-style: italic;
        }

        /* Divider between messages */
        .msg + .msg {
            padding-top: 14px;
            border-top: 1px solid #f0f0f0;
        }

        /* Lists */
        .msg-body .item-list {
            margin: 8px 0;
            padding-left: 0;
            list-style: none;
        }

        .msg-body .item-list li {
            padding: 4px 0;
            font-size: 0.8rem;
            border-bottom: 1px solid #f5f5f5;
        }

        .msg-body .item-list li:last-child {
            border-bottom: none;
        }

        /* Parsed structure block */
        .msg-body .parsed {
            margin: 10px 0;
            padding: 10px 14px;
            background: #f8faf8;
            border: 1px solid #e2e8e2;
            border-radius: 8px;
            font-size: 0.78rem;
        }

        .msg-body .parsed .field {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }

        .msg-body .parsed .field-key {
            color: var(--muted);
            font-weight: 500;
        }

        .msg-body .parsed .field-val {
            font-weight: 600;
            color: var(--dark);
        }

        /* Summary stat block */
        .msg-body .summary-block {
            margin: 8px 0;
            padding: 10px 14px;
            background: #f9f9f9;
            border-left: 3px solid var(--accent);
            border-radius: 0 8px 8px 0;
        }

        .msg-body .summary-block .stat {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--dark);
        }

        .msg-body .summary-block .stat-label {
            font-size: 0.7rem;
            color: var(--muted);
        }

        /* Card */
        .msg-body .card {
            margin: 8px 0;
            padding: 10px 14px;
            background: #fcfcfc;
            border: 1px solid #ebebeb;
            border-radius: 8px;
        }

        .msg-body .card .card-title {
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 2px;
        }

        .msg-body .card .card-meta {
            font-size: 0.72rem;
            color: var(--muted);
        }

        /* Confirm block */
        .msg-body .confirm-block {
            margin: 10px 0;
            padding: 12px 14px;
            background: #fef8f8;
            border: 1px solid #f0d0d0;
            border-radius: 8px;
        }

        .msg-body .confirm-block .confirm-title {
            font-weight: 700;
            font-size: 0.78rem;
            color: #b91c1c;
            margin-bottom: 4px;
        }

        .msg-body .confirm-block .confirm-detail {
            font-size: 0.75rem;
            color: #7f1d1d;
            line-height: 1.4;
        }

        /* Permission block */
        .msg-body .perm-block {
            margin: 10px 0;
            padding: 12px 14px;
            background: #fefcf3;
            border: 1px solid #f0e6c0;
            border-radius: 8px;
        }

        .msg-body .perm-block .perm-icon {
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .msg-body .perm-block .perm-text {
            font-size: 0.75rem;
            color: #92400e;
            line-height: 1.4;
        }

        /* Action split */
        .msg-body .action-split {
            margin: 8px 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .msg-body .action-split .split-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            background: #f9f9f9;
            border: 1px solid #ebebeb;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .msg-body .action-split .split-num {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--muted);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .msg-body .action-split .split-done {
            background: #16a34a;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #bbb;
            animation: typeDot 1.4s ease-in-out infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typeDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-3px); opacity: 1; }
        }

        /* ─── REPLAY ─── */
        .replay-btn {
            display: block;
            margin: 16px auto 0;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: var(--body-font);
            border: 1.5px solid #e5e5e5;
            background: #fff;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .replay-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 500px) {
            body { padding: 20px 12px; }
            .chat-messages { height: 440px; padding: 16px; }
        }
    </style>
</head>
<body>

<div class="demo-container">

    <div class="scenario-tabs" id="scenarioTabs">
        <button class="scenario-tab active" data-scenario="bulk-data">Bulk Data</button>
        <button class="scenario-tab" data-scenario="info-dump">Info Dump</button>
        <button class="scenario-tab" data-scenario="interruption">Interruption</button>
        <button class="scenario-tab" data-scenario="disambiguation">Disambiguation</button>
        <button class="scenario-tab" data-scenario="progressive">Progressive Disclosure</button>
        <button class="scenario-tab" data-scenario="permission">Permission</button>
        <button class="scenario-tab" data-scenario="multi-intent">Multi-Intent</button>
        <button class="scenario-tab" data-scenario="confirmation">Confirmation</button>
    </div>

    <div class="context-strip">
        <div class="label">Edge Case</div>
        <div class="desc" id="contextDesc">Displaying 100s of records in a text-only chat — no tables, no UI components.</div>
    </div>

    <div class="chat-box">
        <div class="chat-messages" id="chatMessages"></div>
    </div>

    <button class="replay-btn" id="replayBtn">↻ Replay</button>
</div>

<script>
const SCENARIOS = {
    'bulk-data': {
        context: 'Displaying 100s of records in a text-only chat — no tables, no UI components.',
        messages: [
            { type: 'user', html: 'Show me all my leads' },
            { type: 'bot', html: 'You have <strong>147 leads</strong> across 4 regions. Here\'s a quick breakdown:<div class="summary-block"><span class="stat">147</span> <span class="stat-label">total leads</span></div><ul class="item-list"><li>🌎 West — 52 leads ($4.2M pipeline)</li><li>🌍 APAC — 41 leads ($3.8M pipeline)</li><li>🌐 Northeast — 33 leads ($2.1M pipeline)</li><li>🌎 Southeast — 21 leads ($1.4M pipeline)</li></ul>Want me to zoom into a region, filter by value, or show the top 10 overall?' },
            { type: 'user', html: 'Top 10 by value' },
            { type: 'bot', html: 'Top 10 leads by deal value:<ul class="item-list"><li><strong>1.</strong> Pinnacle Dynamics — $520K — APAC</li><li><strong>2.</strong> Acme Corp — $450K — West</li><li><strong>3.</strong> Cascade Analytics — $420K — APAC</li><li><strong>4.</strong> NovaTech Solutions — $390K — West</li><li><strong>5.</strong> Meridian Group — $380K — NE</li><li><strong>6.</strong> OceanView Tech — $350K — APAC</li><li><strong>7.</strong> Summit Retail — $340K — West</li><li><strong>8.</strong> Vertex AI — $320K — SE</li><li><strong>9.</strong> BrightPath Edu — $310K — NE</li><li><strong>10.</strong> Atlas Financial — $290K — West</li></ul><em>Showing 10 of 147 — say "next 10" or filter by region/stage.</em>' },
            { type: 'user', html: 'APAC ones over $300K' },
            { type: 'bot', html: 'APAC × $300K+ — <strong>5 leads</strong>:<ul class="item-list"><li>☑️ Pinnacle Dynamics — $520K — Negotiation</li><li>☑️ Cascade Analytics — $420K — Proposal</li><li>☑️ OceanView Tech — $350K — Discovery</li><li>☑️ TechWave APAC — $330K — Qualification</li><li>☑️ NexusPoint — $310K — Proposal</li></ul>That\'s all of them. Sync these 5, or drill into one?' },
        ]
    },
    'info-dump': {
        context: 'User gives all info at once in an unstructured way. Don\'t do annoying back-and-forth — parse it.',
        messages: [
            { type: 'user', html: 'hey register a deal for me — its meridian logistics they want smartsolar pro about 60 units, close by end of august, contact is james chen james.chen@meridian.io, its a net new customer in the APAC region' },
            { type: 'bot', html: 'Got it — I parsed everything from your message:<div class="parsed"><div class="field"><span class="field-key">Customer</span><span class="field-val">Meridian Logistics</span></div><div class="field"><span class="field-key">Product</span><span class="field-val">SmartSolar Pro × 60</span></div><div class="field"><span class="field-key">Close date</span><span class="field-val">Aug 2026</span></div><div class="field"><span class="field-key">Contact</span><span class="field-val">James Chen (james.chen@meridian.io)</span></div><div class="field"><span class="field-key">Type</span><span class="field-val">Net new</span></div><div class="field"><span class="field-key">Region</span><span class="field-val">APAC</span></div></div>Does this look right?' },
            { type: 'user', html: 'actually its 80 units not 60' },
            { type: 'bot', html: 'Updated — <strong>80 units</strong>. Everything else stays the same.<div class="parsed"><div class="field"><span class="field-key">Product</span><span class="field-val">SmartSolar Pro × <strong>80</strong></span></div></div>Ready to submit?' },
            { type: 'user', html: 'yes' },
            { type: 'bot', html: '✅ <strong>Deal registered.</strong> Meridian Logistics / SmartSolar Pro × 80 / Aug 2026. You\'ll get a decision within 5 business days.' },
        ]
    },
    'interruption': {
        context: 'User abandons a flow mid-way to ask something else. Resume gracefully — don\'t lose progress.',
        messages: [
            { type: 'user', html: 'I want to register a deal' },
            { type: 'bot', html: 'Let\'s register this deal. Who\'s the customer?' },
            { type: 'user', html: 'Meridian Logistics' },
            { type: 'bot', html: 'Got it. Which product are they interested in?' },
            { type: 'user', html: 'wait — how many leads did I sync yesterday?' },
            { type: 'bot', html: 'You synced <strong>12 leads</strong> yesterday (6 APAC, 4 West, 2 NE).<br><br><em>I\'ve saved your deal registration progress (Meridian Logistics). Say "continue" to pick up where we left off.</em>' },
            { type: 'user', html: 'continue' },
            { type: 'bot', html: 'Resuming — Meridian Logistics. Which product are they interested in?' },
            { type: 'user', html: 'SmartSolar Pro, 60 units, close end of August' },
            { type: 'bot', html: '✅ <strong>Deal registered.</strong> Meridian Logistics / SmartSolar Pro × 60 / Aug 2026.' },
        ]
    },
    'disambiguation': {
        context: 'Multiple matches for a vague query. Clarify naturally — not a robotic "did you mean?"',
        messages: [
            { type: 'user', html: 'Show me the Acme deal' },
            { type: 'bot', html: 'I found <strong>3 Acme deals</strong>:<div class="card"><div class="card-title">Acme Corp</div><div class="card-meta">$450K · Negotiation · West · Close: Sep 2026</div></div><div class="card"><div class="card-title">Acme Healthcare</div><div class="card-meta">$280K · Discovery · NE · Close: Nov 2026</div></div><div class="card"><div class="card-title">Acme Retail Group</div><div class="card-meta">$95K · Closed Won · SE · Closed: Jun 2026</div></div>Which one?' },
            { type: 'user', html: 'the big one in negotiation' },
            { type: 'bot', html: '<strong>Acme Corp — $450K</strong><ul class="item-list"><li>Stage: Negotiation</li><li>Region: West</li><li>Contact: Sarah Miller</li><li>Next step: Contract review (Jul 15)</li><li>Expected close: Sep 2026</li></ul>What would you like to do with it?' },
        ]
    },
    'progressive': {
        context: 'User asks a broad question. Start with a summary, let them drill down — don\'t dump everything.',
        messages: [
            { type: 'user', html: 'how are my deals going?' },
            { type: 'bot', html: 'Here\'s your pipeline at a glance:<div class="summary-block"><span class="stat">23 active deals</span><br><span class="stat-label">$4.7M total pipeline</span></div><ul class="item-list"><li>🟢 <strong>5</strong> in Negotiation ($1.8M) — closest to close</li><li>🔵 <strong>8</strong> in Proposal ($1.6M)</li><li>⚪ <strong>10</strong> in Discovery ($1.3M)</li></ul><em>3 deals are at risk (no activity in 14+ days).</em> Want me to show those?' },
            { type: 'user', html: 'yes show at-risk' },
            { type: 'bot', html: '⚠️ <strong>3 deals — no activity in 14+ days:</strong><div class="card"><div class="card-title">NovaTech Solutions — $390K</div><div class="card-meta">18 days idle · Proposal · "Waiting on legal review"</div></div><div class="card"><div class="card-title">BrightPath Education — $310K</div><div class="card-meta">21 days idle · Discovery · "Champion went on leave"</div></div><div class="card"><div class="card-title">Atlas Financial — $290K</div><div class="card-meta">16 days idle · Proposal · No notes</div></div>Want me to draft a check-in for any of these?' },
            { type: 'user', html: 'draft something for NovaTech' },
            { type: 'bot', html: 'Here\'s a check-in:<br><br><em>"Hi Sarah — just circling back on the SmartSolar proposal. I know legal reviews can take time — is there anything I can help move along on our end? Happy to hop on a quick call this week."</em><br><br>Send it, or want to tweak the tone?' },
        ]
    },
    'permission': {
        context: 'User requests something outside their access level. Deny softly, explain, offer alternatives.',
        messages: [
            { type: 'user', html: 'show me the full revenue dashboard for Q3' },
            { type: 'bot', html: '<div class="perm-block"><div class="perm-icon">🔒</div><div class="perm-text">The Q3 revenue dashboard is restricted to <strong>Tier 1 partners</strong>. Your current tier: <strong>Gold (Tier 2)</strong>.</div></div>Here\'s what I can show you instead:<ul class="item-list"><li>📊 Your personal pipeline & bookings</li><li>📈 Your region\'s partner leaderboard</li><li>🎯 Your quota attainment vs. target</li></ul>I can also flag a request to your partner manager for access.' },
            { type: 'user', html: 'request access' },
            { type: 'bot', html: '✅ Request sent to <strong>Lisa Park</strong> (your Partner Manager). She typically responds within 1–2 business days.<br><br>In the meantime, want me to show your pipeline summary?' },
        ]
    },
    'multi-intent': {
        context: 'Two actions in one message. Handle both — show progress on each, don\'t force one at a time.',
        messages: [
            { type: 'user', html: 'Sync my APAC leads and also register a deal for Meridian' },
            { type: 'bot', html: 'Two things — handling both:<div class="action-split"><div class="split-item"><span class="split-num">1</span> Sync APAC leads</div><div class="split-item"><span class="split-num">2</span> Register deal — Meridian</div></div>Starting with the sync...' },
            { type: 'bot', html: '<div class="action-split"><div class="split-item"><span class="split-num split-done">✓</span> <strong>12 APAC leads synced</strong></div><div class="split-item"><span class="split-num">2</span> Deal registration — need a few details</div></div>For Meridian: which product?' },
            { type: 'user', html: 'CloudSync Enterprise, 150 users, close by September' },
            { type: 'bot', html: '<div class="action-split"><div class="split-item"><span class="split-num split-done">✓</span> 12 APAC leads synced</div><div class="split-item"><span class="split-num split-done">✓</span> <strong>Deal registered</strong> — Meridian / CloudSync × 150 / Sep 2026</div></div>Both done. Anything else?' },
        ]
    },
    'confirmation': {
        context: 'Destructive action. Apply the right amount of friction — enough to prevent mistakes, not so much it annoys.',
        messages: [
            { type: 'user', html: 'Delete all my Southeast leads' },
            { type: 'bot', html: '<div class="confirm-block"><div class="confirm-title">⚠️ Destructive action</div><div class="confirm-detail">This will permanently remove <strong>21 leads</strong> from your CRM (Southeast region). Cannot be undone.<br><br>Pipeline affected: <strong>$1.4M</strong><br>Includes 3 leads in Proposal stage.</div></div>Type <strong>"delete 21 leads"</strong> to confirm.' },
            { type: 'user', html: 'wait, keep the ones in Proposal stage' },
            { type: 'bot', html: 'Keeping 3 Proposal-stage leads. That leaves <strong>18 leads</strong> to delete (Discovery + Qualification only).<div class="confirm-block"><div class="confirm-title">Confirm deletion</div><div class="confirm-detail">Remove <strong>18 SE leads</strong> ($980K)<br>Keep <strong>3 SE leads</strong> in Proposal ($420K)</div></div>Type <strong>"delete 18 leads"</strong> to confirm.' },
            { type: 'user', html: 'delete 18 leads' },
            { type: 'bot', html: '✅ <strong>18 leads removed.</strong> 3 Proposal-stage leads retained.<br><br><em>Deleted leads are recoverable from trash for 30 days (admin only).</em>' },
        ]
    }
};

// ═══════════════════════════════════════════════════

let currentScenario = 'bulk-data';
let animationTimeouts = [];
const chatMessages = document.getElementById('chatMessages');
const contextDesc = document.getElementById('contextDesc');

function clearAnimations() {
    animationTimeouts.forEach(t => clearTimeout(t));
    animationTimeouts = [];
}

function renderMessages() {
    clearAnimations();
    chatMessages.innerHTML = '';

    const scenario = SCENARIOS[currentScenario];
    contextDesc.textContent = scenario.context;

    let delay = 300;

    scenario.messages.forEach((msg) => {
        const t = setTimeout(() => {
            if (msg.type === 'bot') {
                const typing = document.createElement('div');
                typing.className = 'msg';
                typing.innerHTML = `<div class="msg-label bot-label">Agent</div><div class="typing"><span></span><span></span><span></span></div>`;
                chatMessages.appendChild(typing);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                const t2 = setTimeout(() => {
                    typing.remove();
                    addMessage(msg);
                }, 600);
                animationTimeouts.push(t2);
            } else {
                addMessage(msg);
            }
        }, delay);
        animationTimeouts.push(t);

        delay += msg.type === 'bot' ? 1300 : 800;
    });
}

function addMessage(msg) {
    const div = document.createElement('div');
    div.className = 'msg';

    const label = msg.type === 'user' ? 'You' : 'Agent';
    const labelClass = msg.type === 'user' ? 'user-label' : 'bot-label';

    div.innerHTML = `<div class="msg-label ${labelClass}">${label}</div><div class="msg-body">${msg.html}</div>`;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Events
document.querySelectorAll('.scenario-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.scenario-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentScenario = tab.dataset.scenario;
        renderMessages();
    });
});

document.getElementById('replayBtn').addEventListener('click', renderMessages);

// Init
renderMessages();
</script>

</body>
</html>
