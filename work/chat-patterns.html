<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversational Edge Cases — Design Patterns</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800;9..144,900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #B22222;
            --bg: #fafafa;
            --dark: #0f0f0f;
            --foreground: #1a1a1a;
            --muted: #737373;
            --display-font: 'Fraunces', serif;
            --body-font: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: rgba(178, 34, 34, 0.2); color: inherit; }

        body {
            background: var(--bg);
            color: var(--foreground);
            font-family: var(--body-font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* ─── LAYOUT ─── */
        .demo-container {
            width: 100%;
            max-width: 520px;
        }

        /* ─── SCENARIO TABS ─── */
        .scenario-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .scenario-tab {
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            border: 1.5px solid #e5e5e5;
            background: #fff;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--body-font);
            line-height: 1.3;
        }

        .scenario-tab:hover {
            border-color: var(--foreground);
            color: var(--foreground);
        }

        .scenario-tab.active {
            background: var(--dark);
            color: #fff;
            border-color: var(--dark);
        }

        /* ─── CONTEXT STRIP ─── */
        .context-strip {
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
        }

        .context-strip .label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .context-strip .desc {
            font-size: 0.8rem;
            color: var(--foreground);
            line-height: 1.4;
        }

        /* ─── PHONE MOCKUP ─── */
        .phone-frame {
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            background: #fff;
            border-radius: 40px;
            border: 8px solid #1a1a1a;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.1);
            position: relative;
        }

        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 24px;
            background: #1a1a1a;
            border-radius: 0 0 16px 16px;
            z-index: 10;
        }

        .phone-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 24px;
            font-size: 0.7rem;
            font-weight: 600;
            background: #4a154b;
            color: #fff;
        }

        .channel-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #4a154b;
            color: #fff;
        }

        .channel-header .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #611f69;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
        }

        .channel-header .name {
            font-size: 0.85rem;
            font-weight: 700;
        }

        .channel-header .status {
            font-size: 0.65rem;
            opacity: 0.7;
        }

        /* ─── MESSAGES ─── */
        .messages-area {
            height: 480px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fff;
        }

        .message {
            max-width: 88%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.82rem;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(8px);
            animation: msgIn 0.4s ease-out forwards;
        }

        @keyframes msgIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-self: flex-start;
            background: #f8f8f8;
            border: 1px solid #e8e8e8;
            color: var(--dark);
            border-bottom-left-radius: 4px;
        }

        .message.user {
            align-self: flex-end;
            background: #1264a3;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message strong {
            font-weight: 700;
        }

        .message em {
            opacity: 0.7;
            font-style: italic;
        }

        /* Lists in messages */
        .message .item-list {
            margin: 8px 0;
            padding-left: 0;
            list-style: none;
        }

        .message .item-list li {
            padding: 5px 0;
            font-size: 0.78rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .message .item-list li:last-child {
            border-bottom: none;
        }

        /* Inline cards */
        .message .card {
            margin: 8px 0;
            padding: 10px 12px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
        }

        .message .card .card-title {
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }

        .message .card .card-meta {
            font-size: 0.72rem;
            color: var(--muted);
        }

        /* Summary blocks */
        .message .summary-block {
            margin: 8px 0;
            padding: 10px 12px;
            background: rgba(178, 34, 34, 0.04);
            border-left: 3px solid var(--accent);
            border-radius: 0 8px 8px 0;
        }

        .message .summary-block .stat {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--dark);
        }

        .message .summary-block .stat-label {
            font-size: 0.7rem;
            color: var(--muted);
        }

        /* Parsed structure */
        .message .parsed {
            margin: 8px 0;
            padding: 10px 12px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            font-size: 0.78rem;
        }

        .message .parsed .field {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }

        .message .parsed .field-key {
            color: var(--muted);
            font-weight: 500;
        }

        .message .parsed .field-val {
            font-weight: 600;
            color: var(--dark);
        }

        /* Action buttons */
        .message .msg-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .message .msg-btn {
            padding: 5px 12px;
            border-radius: 14px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid rgba(0,0,0,0.15);
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--body-font);
        }

        .message .msg-btn:hover {
            background: var(--dark);
            color: #fff;
            border-color: var(--dark);
        }

        .message .msg-btn.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .message .msg-btn.primary:hover {
            background: #8b1a1a;
        }

        .message .msg-btn.danger {
            background: #fff;
            color: #dc2626;
            border-color: #dc2626;
        }

        /* Confirmation block */
        .message .confirm-block {
            margin: 10px 0;
            padding: 12px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 10px;
        }

        .message .confirm-block .confirm-title {
            font-weight: 700;
            font-size: 0.78rem;
            color: #dc2626;
            margin-bottom: 6px;
        }

        .message .confirm-block .confirm-detail {
            font-size: 0.72rem;
            color: #7f1d1d;
            line-height: 1.4;
        }

        /* Permission block */
        .message .perm-block {
            margin: 10px 0;
            padding: 12px;
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 10px;
        }

        .message .perm-block .perm-icon {
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .message .perm-block .perm-text {
            font-size: 0.75rem;
            color: #92400e;
            line-height: 1.4;
        }

        /* Multi-action split */
        .message .action-split {
            margin: 8px 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message .action-split .split-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.75rem;
        }

        .message .action-split .split-num {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .message .action-split .split-done {
            background: #16a34a;
        }

        /* Typing indicator */
        .typing-indicator {
            align-self: flex-start;
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #f8f8f8;
            border: 1px solid #e8e8e8;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #999;
            animation: typeDot 1.4s ease-in-out infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typeDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* ─── INPUT BAR ─── */
        .input-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid #e5e5e5;
            background: #fff;
        }

        .input-bar input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid #e0e0e0;
            font-size: 0.8rem;
            font-family: var(--body-font);
            outline: none;
        }

        .input-bar input:focus {
            border-color: var(--accent);
        }

        .input-bar .send-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-bar .send-btn:hover {
            background: #8b1a1a;
        }

        /* ─── HOME BAR ─── */
        .phone-home {
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        .phone-home span {
            width: 100px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 2px;
        }

        /* ─── REPLAY BUTTON ─── */
        .replay-btn {
            display: block;
            margin: 16px auto 0;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: var(--body-font);
            border: 1.5px solid #e5e5e5;
            background: #fff;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .replay-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 500px) {
            body { padding: 20px 12px; }
            .phone-frame { border-radius: 32px; border-width: 6px; }
            .messages-area { height: 400px; }
        }
    </style>
</head>
<body>

<div class="demo-container">

    <!-- Scenario Tabs -->
    <div class="scenario-tabs" id="scenarioTabs">
        <button class="scenario-tab active" data-scenario="bulk-data">Bulk Data</button>
        <button class="scenario-tab" data-scenario="info-dump">Info Dump</button>
        <button class="scenario-tab" data-scenario="interruption">Interruption</button>
        <button class="scenario-tab" data-scenario="disambiguation">Disambiguation</button>
        <button class="scenario-tab" data-scenario="progressive">Progressive Disclosure</button>
        <button class="scenario-tab" data-scenario="permission">Permission</button>
        <button class="scenario-tab" data-scenario="multi-intent">Multi-Intent</button>
        <button class="scenario-tab" data-scenario="confirmation">Confirmation</button>
    </div>

    <!-- Context strip -->
    <div class="context-strip" id="contextStrip">
        <div class="label">Edge Case</div>
        <div class="desc" id="contextDesc">Displaying 100s of records in a text-only chat — no tables, no UI components.</div>
    </div>

    <!-- Phone -->
    <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-status-bar">
            <span>9:41</span>
            <span style="display:flex;gap:4px"><span style="width:16px;height:10px;background:#fff;border-radius:2px;display:block"></span><span style="width:16px;height:10px;background:#fff;border-radius:2px;display:block"></span><span style="width:16px;height:10px;background:#fff;border-radius:2px;display:block"></span></span>
        </div>
        <div class="channel-header">
            <div class="avatar">AF</div>
            <div>
                <div class="name">Agentforce for Partners</div>
                <div class="status">online</div>
            </div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="input-bar">
            <input type="text" placeholder="Type a message..." />
            <button class="send-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
        <div class="phone-home"><span></span></div>
    </div>

    <button class="replay-btn" id="replayBtn">↻ Replay</button>
</div>

<script>
// ═══════════════════════════════════════════════════
// SCENARIO DATA
// ═══════════════════════════════════════════════════

const SCENARIOS = {
    'bulk-data': {
        context: 'Displaying 100s of records in a text-only chat — no tables, no UI components.',
        messages: [
            { type: 'user', html: 'Show me all my leads' },
            { type: 'bot', html: 'You have <strong>147 leads</strong> across 4 regions. Here\'s a quick breakdown:<div class="summary-block"><span class="stat">147</span> <span class="stat-label">total leads</span></div><ul class="item-list"><li>🌎 West — 52 leads ($4.2M pipeline)</li><li>🌍 APAC — 41 leads ($3.8M pipeline)</li><li>🌐 Northeast — 33 leads ($2.1M pipeline)</li><li>🌎 Southeast — 21 leads ($1.4M pipeline)</li></ul>Want me to zoom into a region, filter by value, or show the top 10 overall?' },
            { type: 'user', html: 'Top 10 by value' },
            { type: 'bot', html: 'Top 10 leads by deal value:<ul class="item-list"><li><strong>1.</strong> Pinnacle Dynamics — $520K — APAC</li><li><strong>2.</strong> Acme Corp — $450K — West</li><li><strong>3.</strong> Cascade Analytics — $420K — APAC</li><li><strong>4.</strong> NovaTech Solutions — $390K — West</li><li><strong>5.</strong> Meridian Group — $380K — NE</li><li><strong>6.</strong> OceanView Tech — $350K — APAC</li><li><strong>7.</strong> Summit Retail — $340K — West</li><li><strong>8.</strong> Vertex AI — $320K — SE</li><li><strong>9.</strong> BrightPath Edu — $310K — NE</li><li><strong>10.</strong> Atlas Financial — $290K — West</li></ul><em>Showing 10 of 147 — say "next 10" or filter by region/stage.</em>' },
            { type: 'user', html: 'APAC ones over $300K' },
            { type: 'bot', html: '📍 APAC × $300K+ — <strong>5 leads</strong>:<ul class="item-list"><li>☑️ Pinnacle Dynamics — $520K — Negotiation</li><li>☑️ Cascade Analytics — $420K — Proposal</li><li>☑️ OceanView Tech — $350K — Discovery</li><li>☑️ TechWave APAC — $330K — Qualification</li><li>☑️ NexusPoint — $310K — Proposal</li></ul>That\'s all of them. Sync these 5, or drill into one?' },
        ]
    },
    'info-dump': {
        context: 'User gives all info at once in an unstructured way. Don\'t do annoying back-and-forth — parse it.',
        messages: [
            { type: 'user', html: 'hey register a deal for me — its meridian logistics they want smartsolar pro about 60 units, close by end of august, contact is james chen james.chen@meridian.io, its a net new customer in the APAC region' },
            { type: 'bot', html: 'Got it — I parsed everything from your message:<div class="parsed"><div class="field"><span class="field-key">Customer</span><span class="field-val">Meridian Logistics</span></div><div class="field"><span class="field-key">Product</span><span class="field-val">SmartSolar Pro × 60</span></div><div class="field"><span class="field-key">Close date</span><span class="field-val">Aug 2026</span></div><div class="field"><span class="field-key">Contact</span><span class="field-val">James Chen (james.chen@meridian.io)</span></div><div class="field"><span class="field-key">Type</span><span class="field-val">Net new</span></div><div class="field"><span class="field-key">Region</span><span class="field-val">APAC</span></div></div>Does this look right?', actions: [{ label: 'Submit', primary: true }, { label: 'Edit something' }] },
            { type: 'user', html: 'actually its 80 units not 60' },
            { type: 'bot', html: 'Updated — <strong>80 units</strong>. Everything else stays the same.<div class="parsed"><div class="field"><span class="field-key">Product</span><span class="field-val">SmartSolar Pro × <strong>80</strong></span></div></div>', actions: [{ label: 'Submit now', primary: true }] },
            { type: 'user', html: 'Submit now' },
            { type: 'bot', html: '✅ <strong>Deal registered!</strong> Meridian Logistics / SmartSolar Pro × 80 / Aug 2026. You\'ll get a decision within 5 business days.' },
        ]
    },
    'interruption': {
        context: 'User abandons a flow mid-way to ask something else. Resume gracefully — don\'t lose progress.',
        messages: [
            { type: 'user', html: 'I want to register a deal' },
            { type: 'bot', html: 'Let\'s register this deal. <strong>Who\'s the customer?</strong>' },
            { type: 'user', html: 'Meridian Logistics' },
            { type: 'bot', html: 'Got it. <strong>Which product</strong> are they interested in?' },
            { type: 'user', html: 'wait actually — how many leads did I sync yesterday?' },
            { type: 'bot', html: 'You synced <strong>12 leads</strong> yesterday (6 APAC, 4 West, 2 NE).<br><br><em>I\'ve saved your deal registration progress — say "continue" when you\'re ready to pick up where we left off.</em>', actions: [{ label: 'Continue registration', primary: true }, { label: 'Show yesterday\'s leads' }] },
            { type: 'user', html: 'Continue registration' },
            { type: 'bot', html: 'Picking up where we left off — Meridian Logistics.<br><strong>Which product</strong> are they interested in?' },
            { type: 'user', html: 'SmartSolar Pro, 60 units' },
            { type: 'bot', html: 'And <strong>when do you expect to close?</strong>' },
        ]
    },
    'disambiguation': {
        context: 'Multiple matches for a vague query. Clarify naturally — not a robotic "did you mean?"',
        messages: [
            { type: 'user', html: 'Show me the Acme deal' },
            { type: 'bot', html: 'I found <strong>3 Acme deals</strong> — which one?<div class="card"><div class="card-title">Acme Corp</div><div class="card-meta">$450K · Negotiation · West · Close: Sep 2026</div></div><div class="card"><div class="card-title">Acme Healthcare</div><div class="card-meta">$280K · Discovery · NE · Close: Nov 2026</div></div><div class="card"><div class="card-title">Acme Retail Group</div><div class="card-meta">$95K · Closed Won · SE · Closed: Jun 2026</div></div>', actions: [{ label: 'Acme Corp', primary: true }, { label: 'Healthcare' }, { label: 'Retail' }] },
            { type: 'user', html: 'the big one in negotiation' },
            { type: 'bot', html: 'That\'s <strong>Acme Corp — $450K</strong>:<ul class="item-list"><li>Stage: Negotiation</li><li>Region: West</li><li>Contact: Sarah Miller</li><li>Next step: Contract review (Jul 15)</li><li>Close: Sep 2026</li></ul>What would you like to do with it?', actions: [{ label: 'Update stage' }, { label: 'Draft outreach', primary: true }, { label: 'View history' }] },
        ]
    },
    'progressive': {
        context: 'User asks a broad question. Start with the summary, let them drill down — don\'t dump everything.',
        messages: [
            { type: 'user', html: 'how are my deals going?' },
            { type: 'bot', html: 'Here\'s your pipeline snapshot:<div class="summary-block"><span class="stat">23 active deals</span><br><span class="stat-label">$4.7M total pipeline</span></div><ul class="item-list"><li>🟢 <strong>5</strong> in Negotiation ($1.8M) — closest to close</li><li>🔵 <strong>8</strong> in Proposal ($1.6M)</li><li>⚪ <strong>10</strong> in Discovery ($1.3M)</li></ul><em>3 deals are at risk (no activity in 14+ days).</em>', actions: [{ label: 'Show at-risk deals', primary: true }, { label: 'Negotiation details' }, { label: 'Full list' }] },
            { type: 'user', html: 'Show at-risk deals' },
            { type: 'bot', html: '⚠️ <strong>3 deals with no activity in 14+ days:</strong><div class="card"><div class="card-title">NovaTech Solutions — $390K</div><div class="card-meta">Last activity: 18 days ago · Stage: Proposal · "Waiting on legal review"</div></div><div class="card"><div class="card-title">BrightPath Education — $310K</div><div class="card-meta">Last activity: 21 days ago · Stage: Discovery · "Champion went on leave"</div></div><div class="card"><div class="card-title">Atlas Financial — $290K</div><div class="card-meta">Last activity: 16 days ago · Stage: Proposal · No notes</div></div>Want me to draft a check-in message for any of these?' },
            { type: 'user', html: 'draft something for NovaTech' },
            { type: 'bot', html: 'Here\'s a check-in for NovaTech:<br><br><em>"Hi Sarah — just circling back on the SmartSolar proposal. I know legal reviews can take time — is there anything I can help move along on our end? Happy to hop on a quick call this week."</em>', actions: [{ label: 'Send via email', primary: true }, { label: 'Edit' }] },
        ]
    },
    'permission': {
        context: 'User asks for something outside their access level. Deny softly, explain why, offer an alternative.',
        messages: [
            { type: 'user', html: 'show me the full revenue dashboard for Q3' },

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════

let currentScenario = 'bulk-data';
let animationTimeouts = [];

// ═══════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════

const messagesArea = document.getElementById('messagesArea');
const contextDesc = document.getElementById('contextDesc');

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════

function clearAnimations() {
    animationTimeouts.forEach(t => clearTimeout(t));
    animationTimeouts = [];
}

function renderMessages() {
    clearAnimations();
    messagesArea.innerHTML = '';

    const scenario = SCENARIOS[currentScenario];
    contextDesc.textContent = scenario.context;

    let delay = 400;

    scenario.messages.forEach((msg) => {
        const t = setTimeout(() => {
            if (msg.type === 'bot') {
                const typing = document.createElement('div');
                typing.className = 'typing-indicator';
                typing.innerHTML = '<span></span><span></span><span></span>';
                messagesArea.appendChild(typing);
                messagesArea.scrollTop = messagesArea.scrollHeight;

                const t2 = setTimeout(() => {
                    typing.remove();
                    addMessage(msg);
                }, 700);
                animationTimeouts.push(t2);
            } else {
                addMessage(msg);
            }
        }, delay);
        animationTimeouts.push(t);

        delay += msg.type === 'bot' ? 1400 : 900;
    });
}

function addMessage(msg) {
    const div = document.createElement('div');
    div.className = `message ${msg.type}`;

    let content = msg.html || msg.text || '';

    if (msg.actions) {
        content += '<div class="msg-actions">';
        msg.actions.forEach(a => {
            const cls = a.primary ? 'primary' : (a.danger ? 'danger' : '');
            content += `<button class="msg-btn ${cls}">${a.label}</button>`;
        });
        content += '</div>';
    }

    div.innerHTML = content;
    messagesArea.appendChild(div);
    messagesArea.scrollTop = messagesArea.scrollHeight;
}

// ═══════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════

document.querySelectorAll('.scenario-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.scenario-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentScenario = tab.dataset.scenario;
        renderMessages();
    });
});

document.getElementById('replayBtn').addEventListener('click', () => {
    renderMessages();
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════

renderMessages();
</script>
