<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Agent — Live Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800;9..144,900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #B22222;
            --bg: #fafafa;
            --dark: #0f0f0f;
            --foreground: #1a1a1a;
            --muted: #737373;
            --display-font: 'Fraunces', serif;
            --body-font: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::selection { background: rgba(178, 34, 34, 0.2); color: inherit; }

        body {
            background: var(--bg);
            color: var(--foreground);
            font-family: var(--body-font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* ─── TABS ─── */
        .demo-container {
            width: 100%;
            max-width: 480px;
        }

        .journey-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .journey-tab {
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1.5px solid #e5e5e5;
            background: #fff;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .journey-tab:hover {
            border-color: var(--foreground);
            color: var(--foreground);
        }

        .journey-tab.active {
            background: var(--dark);
            color: #fff;
            border-color: var(--dark);
        }

        .channel-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }

        .channel-tab {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #e5e5e5;
            background: #fff;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .channel-tab:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .channel-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .channel-tab svg {
            width: 14px;
            height: 14px;
        }

        .sub-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .sub-tab {
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid #e5e5e5;
            background: #fff;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sub-tab:hover {
            border-color: var(--foreground);
        }

        .sub-tab.active {
            background: var(--foreground);
            color: #fff;
            border-color: var(--foreground);
        }

        /* ─── PHONE MOCKUP ─── */
        .phone-frame {
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            background: #fff;
            border-radius: 40px;
            border: 8px solid #1a1a1a;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.1);
            position: relative;
        }

        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 24px;
            background: #1a1a1a;
            border-radius: 0 0 16px 16px;
            z-index: 10;
        }

        .phone-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 24px;
            font-size: 0.7rem;
            font-weight: 600;
            background: inherit;
        }

        .phone-status-bar .time {
            margin-left: 4px;
        }

        .phone-status-bar .icons {
            display: flex;
            gap: 4px;
        }

        .phone-status-bar .icons span {
            display: block;
            width: 16px;
            height: 10px;
            background: currentColor;
            border-radius: 2px;
        }

        /* ─── CHANNEL HEADERS ─── */
        .channel-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #e5e5e5;
        }

        .channel-header.slack {
            background: #4a154b;
            color: #fff;
            border-bottom: none;
        }

        .channel-header.whatsapp {
            background: #075e54;
            color: #fff;
            border-bottom: none;
        }

        .channel-header.sms {
            background: #f5f5f5;
            color: var(--dark);
        }

        .channel-header .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .channel-header.slack .avatar {
            background: #611f69;
            color: #fff;
        }

        .channel-header.whatsapp .avatar {
            background: #128c7e;
            color: #fff;
        }

        .channel-header.sms .avatar {
            background: #007aff;
            color: #fff;
        }

        .channel-header .name {
            font-size: 0.85rem;
            font-weight: 700;
        }

        .channel-header .status {
            font-size: 0.65rem;
            opacity: 0.7;
        }

        /* ─── MESSAGES ─── */
        .messages-area {
            height: 460px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fff;
        }

        .messages-area.whatsapp-bg {
            background: #ece5dd;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.82rem;
            line-height: 1.5;
            opacity: 0;
            transform: translateY(8px);
            animation: msgIn 0.4s ease-out forwards;
        }

        @keyframes msgIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-self: flex-start;
            background: #f0f0f0;
            color: var(--dark);
            border-bottom-left-radius: 4px;
        }

        .message.bot.slack-msg {
            background: #f8f8f8;
            border: 1px solid #e8e8e8;
        }

        .message.bot.whatsapp-msg {
            background: #fff;
        }

        .message.user {
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.user.slack-msg {
            background: #1264a3;
            color: #fff;
        }

        .message.user.whatsapp-msg {
            background: #dcf8c6;
            color: var(--dark);
        }

        .message.user.sms-msg {
            background: #007aff;
            color: #fff;
        }

        .message.bot.sms-msg {
            background: #e9e9eb;
            color: var(--dark);
        }

        .message strong {
            font-weight: 700;
        }

        .message .lead-list {
            margin: 8px 0;
            padding-left: 0;
            list-style: none;
        }

        .message .lead-list li {
            padding: 4px 0;
            font-size: 0.78rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .message .lead-list li:last-child {
            border-bottom: none;
        }

        .message .msg-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .message .msg-btn {
            padding: 5px 12px;
            border-radius: 14px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid rgba(0,0,0,0.15);
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .message .msg-btn:hover {
            background: var(--dark);
            color: #fff;
            border-color: var(--dark);
        }

        .message .msg-btn.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .message .msg-btn.primary:hover {
            background: #8b1a1a;
        }

        /* Typing indicator */
        .typing-indicator {
            align-self: flex-start;
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #f0f0f0;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #999;
            animation: typeDot 1.4s ease-in-out infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typeDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* ─── INPUT BAR ─── */
        .input-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid #e5e5e5;
            background: #fff;
        }

        .input-bar input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid #e0e0e0;
            font-size: 0.8rem;
            font-family: var(--body-font);
            outline: none;
        }

        .input-bar input:focus {
            border-color: var(--accent);
        }

        .input-bar .send-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-bar .send-btn:hover {
            background: #8b1a1a;
        }

        /* ─── PHONE HOME INDICATOR ─── */
        .phone-home {
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        .phone-home span {
            width: 100px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 2px;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 500px) {
            body { padding: 20px 12px; }
            .phone-frame { border-radius: 32px; border-width: 6px; }
            .messages-area { height: 400px; }
        }
    </style>
</head>

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════

let currentJourney = 'partner-connect';
let currentChannel = 'slack';
let currentSub = 'few';
let animationTimeout = null;

// ═══════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════

const messagesArea = document.getElementById('messagesArea');
const subTabs = document.getElementById('subTabs');
const channelHeader = document.getElementById('channelHeader');
const statusBar = document.getElementById('statusBar');

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════

function getMessages() {
    const journeyData = CONVERSATIONS[currentJourney];
    if (journeyData._default) {
        return journeyData._default[currentChannel] || [];
    }
    const subData = journeyData[currentSub];
    return subData ? (subData[currentChannel] || []) : [];
}

function updateHeader() {
    const names = {
        slack: 'Agentforce for Partners',
        whatsapp: 'Partner Cloud',
        sms: 'Partner Success Agent'
    };
    const classes = {
        slack: 'channel-header slack',
        whatsapp: 'channel-header whatsapp',
        sms: 'channel-header sms'
    };
    const avatarText = {
        slack: 'AF',
        whatsapp: 'PC',
        sms: 'PS'
    };

    channelHeader.className = classes[currentChannel];
    channelHeader.innerHTML = `
        <div class="avatar">${avatarText[currentChannel]}</div>
        <div>
            <div class="name">${names[currentChannel]}</div>
            <div class="status">online</div>
        </div>
    `;

    // Status bar color
    if (currentChannel === 'slack') {
        statusBar.style.background = '#4a154b';
        statusBar.style.color = '#fff';
    } else if (currentChannel === 'whatsapp') {
        statusBar.style.background = '#075e54';
        statusBar.style.color = '#fff';
    } else {
        statusBar.style.background = '#f5f5f5';
        statusBar.style.color = '#000';
    }
}

function updateMessagesBackground() {
    messagesArea.className = 'messages-area';
    if (currentChannel === 'whatsapp') {
        messagesArea.classList.add('whatsapp-bg');
    }
}

function renderMessages() {
    // Clear any running animations
    if (animationTimeout) {
        clearTimeout(animationTimeout);
        animationTimeout = null;
    }

    messagesArea.innerHTML = '';
    updateHeader();
    updateMessagesBackground();

    const messages = getMessages();
    let delay = 300;

    messages.forEach((msg, i) => {
        animationTimeout = setTimeout(() => {
            // Show typing indicator for bot messages
            if (msg.type === 'bot') {
                const typing = document.createElement('div');
                typing.className = 'typing-indicator';
                typing.innerHTML = '<span></span><span></span><span></span>';
                messagesArea.appendChild(typing);
                messagesArea.scrollTop = messagesArea.scrollHeight;

                setTimeout(() => {
                    typing.remove();
                    addMessage(msg);
                }, 600);
            } else {
                addMessage(msg);
            }
        }, delay);

        delay += msg.type === 'bot' ? 1200 : 800;
    });
}

function addMessage(msg) {
    const div = document.createElement('div');
    const channelClass = currentChannel === 'slack' ? 'slack-msg' :
                         currentChannel === 'whatsapp' ? 'whatsapp-msg' : 'sms-msg';
    div.className = `message ${msg.type} ${channelClass}`;

    let content = msg.html || msg.text;

    if (msg.actions) {
        content += '<div class="msg-actions">';
        msg.actions.forEach(a => {
            content += `<button class="msg-btn ${a.primary ? 'primary' : ''}">${a.label}</button>`;
        });
        content += '</div>';
    }

    div.innerHTML = content;
    messagesArea.appendChild(div);
    messagesArea.scrollTop = messagesArea.scrollHeight;
}

// ═══════════════════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════════════════

document.querySelectorAll('.journey-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.journey-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentJourney = tab.dataset.journey;

        // Show/hide sub-tabs
        if (currentJourney === 'partner-connect') {
            subTabs.style.display = 'flex';
        } else {
            subTabs.style.display = 'none';
        }

        renderMessages();
    });
});

document.querySelectorAll('.channel-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.channel-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentChannel = tab.dataset.channel;
        renderMessages();
    });
});

document.querySelectorAll('.sub-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentSub = tab.dataset.sub;
        renderMessages();
    });
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════

renderMessages();
</script>
